name: Hoshi
options:
  bundleIdPrefix: com.hoshi
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.4"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    "EXCLUDED_ARCHS[sdk=iphonesimulator*]": x86_64

packages:
  Citadel:
    url: https://github.com/orlandos-nl/Citadel.git
    from: "0.12.0"
  CryptoSwift:
    url: https://github.com/krzyzanowskim/CryptoSwift.git
    from: "1.8.0"

targets:
  Hoshi:
    type: application
    platform: iOS
    sources:
      - Hoshi
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_CFBundleDisplayName: "Hoshi"
        INFOPLIST_KEY_UIAppFonts:
          - FantasqueSansMNerdFontMono-Regular.ttf
          - FantasqueSansMNerdFontMono-Italic.ttf
          - FantasqueSansMNerdFontMono-Bold.ttf
          - FantasqueSansMNerdFontMono-BoldItalic.ttf
        PRODUCT_BUNDLE_IDENTIFIER: com.hoshi.app.dev
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: N3HRK533Y8
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: Citadel
      - package: CryptoSwift
      - framework: Frameworks/GhosttyKit.xcframework

  HoshiTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - HoshiTests
    dependencies:
      - target: Hoshi
    settings:
      base:
        CODE_SIGNING_ALLOWED: "NO"
