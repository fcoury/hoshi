name: Hoshi
options:
  bundleIdPrefix: com.hoshi
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.4"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"

packages:
  Citadel:
    url: https://github.com/orlandos-nl/Citadel.git
    from: "0.12.0"
  CryptoSwift:
    url: https://github.com/krzyzanowskim/CryptoSwift.git
    from: "1.8.0"
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    from: "1.10.1"

targets:
  Hoshi:
    type: application
    platform: iOS
    sources:
      - Hoshi
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_CFBundleDisplayName: "Hoshi"
        INFOPLIST_KEY_UIAppFonts:
          - FantasqueSansMNerdFontMono-Regular.ttf
          - FantasqueSansMNerdFontMono-Italic.ttf
          - FantasqueSansMNerdFontMono-Bold.ttf
          - FantasqueSansMNerdFontMono-BoldItalic.ttf
        PRODUCT_BUNDLE_IDENTIFIER: com.hoshi.app
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
    dependencies:
      - package: Citadel
      - package: CryptoSwift
      - package: SwiftTerm

  HoshiTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - HoshiTests
    dependencies:
      - target: Hoshi
    settings:
      base:
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
